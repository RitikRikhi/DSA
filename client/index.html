<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSA Media Crew - Welcome</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --black: #0a0a0a;
      --white: #f5f0eb;
      --red: #c8102e;
      --gold: #b8a06a;
    }

    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: var(--black);
    }

    #splash-container {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #splash-video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    .enter-btn {
      position: absolute;
      bottom: 10%;
      z-index: 2;
      background: rgba(200, 16, 46, 0.8);
      color: var(--white);
      border: 1px solid var(--gold);
      padding: 1rem 3rem;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.3s;
      opacity: 0;
      animation: fadeInBtn 1s 2s forwards;
    }

    .enter-btn:hover {
      background: var(--red);
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(200, 16, 46, 0.5);
    }

    @keyframes fadeInBtn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>
  <div id="splash-container">
    <video id="splash-video" autoplay muted playsinline>
      <source src="videos/digital_3d_logo.mp4" type="video/mp4">
    </video>
    <a href="home.html" class="enter-btn">ENTER EXPERIENCE</a>
  </div>
</body>

</html>
